services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sessions
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sessions"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  keycloak:
    image: node:22-alpine
    working_dir: /app
    command: ["node", "simulators/keycloakSimulator.mjs"]
    volumes:
      - .:/app
    environment:
      KEYCLOAK_SIM_PORT: "8085"
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8085/health"]
      interval: 2s
      timeout: 3s
      retries: 30

